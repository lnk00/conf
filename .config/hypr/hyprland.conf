
# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf
#


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor= auto, 2560x1440@144.00Hz, 0x0, 1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
$menu = tofi-run | xargs hyprctl dispatch exec --
$browser = glide-browser
$mail = XDG_SESSION_TYPE=x11 proton-mail
$slack = slack
$ide = zeditor


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = clipse -listen
exec-once = hyperlauncher -d
exec-once = waybar
exec-once = swaync
exec-once = hyprsunset

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,12
env = HYPRCURSOR_THEME,volantes
env = HYPRCURSOR_SIZE,12


###################
### PERMISSIONS ###
###################


#####################
### LOOK AND FEEL ###
#####################


general {
    gaps_in = 8
    gaps_out = 16

    border_size = 2
    col.active_border = rgba(27272AFF)
    col.inactive_border = rgba(27272A44)
    resize_on_border = false

    allow_tearing = true

    layout = dwindle
}

decoration {
    rounding = 0
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
        range = 20
        render_power = 3
        color = rgba(d4d4d4FF)
    }

    blur {
        enabled = true
        size = 10
        passes = 1

        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1,     10,    default
    animation = border,        1,     3,     almostLinear
    animation = windows,       1,     2,     almostLinear, slide
    animation = windowsIn,     1,     2,     almostLinear, slide
    animation = windowsOut,    1,     1.49,  linear,       slide
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     2.0,   almostLinear, slide
    animation = workspacesIn,  1,     2.0,   almostLinear, slide
    animation = workspacesOut, 1,     1.5,   almostLinear, slide
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    background_color = rgba(E5E5E5FF)
    enable_swallow = true
    middle_click_paste = false
}



#############
### INPUT ###
#############

input {
    kb_layout = us

    repeat_rate = 100
    repeat_delay = 200

    follow_mouse = 1
    sensitivity = -0.8

}

###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, T, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, M, exec, $mail
bind = $mainMod, S, exec, $slack
bind = $mainMod, Z, exec, $ide
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, M, exit,
bind = $mainMod, F, fullscreen,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, SLASH, togglesplit, # dwindle

# Move focus
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move window
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Resize window
bind = $mainMod ALT, H, resizeactive, -50 0
bind = $mainMod ALT, L, resizeactive, 50 0
bind = $mainMod ALT, K, resizeactive, 0 -50
bind = $mainMod ALT, J, resizeactive, 0 50

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Rebind copy/past
binde = $mainMod, C, sendshortcut, CTRL, INSERT,
binde = $mainMod, V, sendshortcut, SHIFT, INSERT,

# Media binds
bindl = , F8, exec, playerctl play-pause
bindl = , F7, exec, playerctl previous
bindl = , F9, exec, playerctl next
bindel = , F12, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , F11, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , F10, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Screenshot / record
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)"
bind = $mainMod SHIFT, R, exec, wf-recorder -g "$(slurp)"

# Brightness
bind = , F1, exec, hyprctl hyprsunset gamma -10
bind = , F2, exec, hyprctl hyprsunset gamma +10

# Brightness
bind = $mainMod, F1, exec, hyprctl hyprsunset temperature 3000
bind = $mainMod, F2, exec, hyprctl hyprsunset identity

# Notification center
bind = , F4, exec, swaync-client -t -sw

# Ignore maximize requests from apps. You'll probably like this.
# windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
# windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
