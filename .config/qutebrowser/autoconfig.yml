# If a config.py file exists, this file is ignored unless it's explicitly loaded
# via config.load_autoconfig(). For more information, see:
# https://github.com/qutebrowser/qutebrowser/blob/main/doc/help/configuring.asciidoc#loading-autoconfigyml
# DO NOT edit this file by hand, qutebrowser will overwrite it.
# Instead, create a config.py - see :help for details.

config_version: 2
settings:
  colors.downloads.system.bg:
    global: none
  colors.hints.bg:
    global: white
  colors.hints.match.fg:
    global: red
  colors.keyhint.bg:
    global: rgba(0, 0, 0, 80%)
  colors.tabs.bar.bg:
    global: '#555555'
  colors.tabs.even.bg:
    global: darkgrey
  colors.tabs.pinned.selected.even.bg:
    global: black
  colors.tabs.selected.even.bg:
    global: black
  colors.tabs.selected.odd.bg:
    global: black
  content.fullscreen.window:
    global: false
  content.javascript.log:
    global:
      error: none
      info: none
      unknown: none
      warning: none
  content.javascript.log_message.levels:
    global: {}
  content.media.audio_video_capture:
    https://meet.google.com: true
  hints.border:
    global: 1px solid black
  hints.padding:
    global:
      bottom: 2
      left: 3
      right: 3
      top: 2
  hints.radius:
    global: 2
  hints.uppercase:
    global: false
  qt.highdpi:
    global: false
  scrolling.bar:
    global: overlay
  scrolling.smooth:
    global: true
  statusbar.padding:
    global:
      bottom: 2
      left: 2
      right: 2
      top: 2
  statusbar.position:
    global: bottom
  statusbar.show:
    global: in-mode
  statusbar.widgets:
    global:
    - keypress
    - search_match
    - url
    - scroll
    - history
    - tabs
    - progress
  tabs.background:
    global: true
  tabs.favicons.show:
    global: never
  tabs.indicator.padding:
    global:
      bottom: 2
      left: 2
      right: 4
      top: 2
  tabs.indicator.width:
    global: 2
  tabs.position:
    global: bottom
  tabs.show:
    global: switching
  tabs.title.alignment:
    global: left
  url.default_page:
    global: https://perplexity.ai/
  url.searchengines:
    global:
      '!g': https://google.com/search?q={}
      DEFAULT: https://perplexity.ai/search?q={}
  url.start_pages:
    global: https://perplexity.ai
  window.hide_decoration:
    global: true
  window.transparent:
    global: false
